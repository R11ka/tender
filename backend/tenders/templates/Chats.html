<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TenderFlow — Чаты</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chats-container {
            display: flex;
            gap: 24px;
            height: calc(100vh - 140px);
            min-height: 500px;
        }
        .chat-list-panel {
            width: 320px;
            flex-shrink: 0;
            background: white;
            border-radius: 24px;
            border: 1px solid #EFF3F8;
            overflow-y: auto;
        }
        .chat-main-panel {
            flex: 1;
            background: white;
            border-radius: 24px;
            border: 1px solid #EFF3F8;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-contact {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            border-bottom: 1px solid #F0F4F9;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-contact:hover, .chat-contact.active {
            background: #FAFCFE;
        }
        .chat-contact-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2C6E9F, #4A7C9F);
            border-radius: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
        }
        .chat-contact-info {
            flex: 1;
        }
        .chat-contact-name {
            font-weight: 600;
            margin-bottom: 4px;
        }
        .chat-contact-preview {
            font-size: 12px;
            color: #8A99A8;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            display: flex;
            gap: 12px;
        }
        .message.incoming .message-bubble {
            background: #F5F7FA;
        }
        .message.outgoing {
            justify-content: flex-end;
        }
        .message.outgoing .message-bubble {
            background: linear-gradient(135deg, #2C6E9F, #1F5A85);
            color: white;
        }
        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 14px;
        }
        .message-time {
            font-size: 10px;
            color: #8A99A8;
            margin-top: 4px;
        }
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid #F0F4F9;
            display: flex;
            gap: 12px;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #E9EEF3;
            border-radius: 60px;
            font-size: 14px;
        }
        .empty-chat {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #8A99A8;
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">TenderFlow<span>B2B</span></div>
            <nav>
                <a href="index.html" class="nav-item"><svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9L12 3L21 9L12 15L3 9Z"/><path d="M3 15L12 21L21 15"/></svg>Дашборд</a>
                <a href="engineering-lists.html" class="nav-item"><svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Инженерные листы</a>
                <a href="lots.html" class="nav-item"><svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>Закупочные лоты</a>
                <a href="suppliers.html" class="nav-item"><svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>Поставщики</a>
                <a href="chats.html" class="nav-item active"><svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Чаты</a>
                <a href="profile.html" class="nav-item" style="margin-top: auto;">
    <svg class="nav-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
    </svg>
    Профиль
</a>
            </nav>
        </aside>

        <div class="main">
            <header class="top-bar">
                <div class="search-bar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8A99A8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" placeholder="Поиск по чатам..."></div>
                <div class="user-menu"><span class="user-name">Анна Менеджер</span><div class="avatar">АМ</div></div>
            </header>

            <div class="page-content">
                <div class="page-header">
                    <h1>Чаты с поставщиками</h1>
                </div>

                <div class="chats-container">
                    <div class="chat-list-panel">
                        <div class="chat-contact" data-contact="cable">
                            <div class="chat-contact-avatar">КС</div>
                            <div class="chat-contact-info">
                                <div class="chat-contact-name">ООО "КабельСнаб"</div>
                                <div class="chat-contact-preview">Цена согласована...</div>
                            </div>
                        </div>
                        <div class="chat-contact" data-contact="electro">
                            <div class="chat-contact-avatar">ЭЩ</div>
                            <div class="chat-contact-info">
                                <div class="chat-contact-name">ООО "ЭлектроЩит"</div>
                                <div class="chat-contact-preview">Уточните сроки доставки</div>
                            </div>
                        </div>
                        <div class="chat-contact" data-contact="plast">
                            <div class="chat-contact-avatar">ПТ</div>
                            <div class="chat-contact-info">
                                <div class="chat-contact-name">ООО "ПластТорг"</div>
                                <div class="chat-contact-preview">Новое КП по трубам</div>
                            </div>
                        </div>
                    </div>

                    <div class="chat-main-panel" id="chatMain">
                        <div class="chat-messages" id="chatMessages">
                            <div class="empty-chat">Выберите диалог слева</div>
                        </div>
                        <div class="chat-input-area" id="chatInput" style="display: none;">
                            <input type="text" id="messageInput" placeholder="Введите сообщение...">
                            <button class="btn-primary" onclick="sendMessage()">Отправить →</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="modal"><div class="modal-content"><h2>Вход</h2><input placeholder="Email"><input type="password" placeholder="Пароль"><button class="btn-primary btn-block" onclick="closeModal('login')">Войти →</button><div class="modal-close" onclick="closeModal('login')">Закрыть</div></div></div>
    <div id="registerModal" class="modal"><div class="modal-content"><h2>Регистрация</h2><input placeholder="Имя"><input placeholder="Email"><input type="password" placeholder="Пароль"><select><option>Менеджер</option><option>Наблюдатель</option></select><button class="btn-primary btn-block" onclick="closeModal('register')">Создать аккаунт →</button><div class="modal-close" onclick="closeModal('register')">Закрыть</div></div></div>

    <script src="js/main.js"></script>
    <script>
        let currentContact = null;
        
        const messagesData = {
            cable: [
                { text: 'Добрый день! Цена по кабелю ВВГнг 3x1.5 согласована на уровне 118 000 ₽', sender: 'supplier', time: '10:30' },
                { text: 'Отлично, ждем протокол для подписания', sender: 'me', time: '10:35' },
                { text: 'Протокол направим сегодня до обеда', sender: 'supplier', time: '11:00' }
            ],
            electro: [
                { text: 'Здравствуйте! Уточните пожалуйста сроки поставки щитов', sender: 'supplier', time: 'вчера' },
                { text: 'Срок — 21 день с момента подписания', sender: 'me', time: 'вчера' },
                { text: 'Принято, готовим коммерческое предложение', sender: 'supplier', time: 'вчера' }
            ],
            plast: [
                { text: 'Новое КП по трубе ПНД 50мм — цена 320 ₽/м', sender: 'supplier', time: '2 часа назад' },
                { text: 'Рассмотрим, спасибо', sender: 'me', time: '1 час назад' }
            ]
        };
        
        function renderMessages(contact) {
            const container = document.getElementById('chatMessages');
            const messages = messagesData[contact] || [];
            
            if (messages.length === 0) {
                container.innerHTML = '<div class="empty-chat">Нет сообщений. Напишите что-нибудь</div>';
                return;
            }
            
            container.innerHTML = messages.map(msg => `
                <div class="message ${msg.sender === 'me' ? 'outgoing' : 'incoming'}">
                    <div class="message-bubble">
                        ${msg.text}
                        <div class="message-time">${msg.time}</div>
                    </div>
                </div>
            `).join('');
            
            // Скролл вниз
            container.scrollTop = container.scrollHeight;
        }
        
        function openChat(contact) {
            currentContact = contact;
            
            // Обновляем активный контакт в списке
            document.querySelectorAll('.chat-contact').forEach(el => el.classList.remove('active'));
            document.querySelector(`.chat-contact[data-contact="${contact}"]`).classList.add('active');
            
            // Показываем поле ввода
            document.getElementById('chatInput').style.display = 'flex';
            
            // Рендерим сообщения
            renderMessages(contact);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentContact) return;
            
            // Добавляем сообщение
            if (!messagesData[currentContact]) messagesData[currentContact] = [];
            messagesData[currentContact].push({
                text: text,
                sender: 'me',
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
            });
            
            // Очищаем поле
            input.value = '';
            
            // Обновляем отображение
            renderMessages(currentContact);
            
            // Имитация ответа (опционально)
            setTimeout(() => {
                if (currentContact) {
                    messagesData[currentContact].push({
                        text: 'Спасибо, мы рассмотрим ваш запрос',
                        sender: 'supplier',
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    renderMessages(currentContact);
                }
            }, 1000);
        }
        
        // Навешиваем обработчики
        document.querySelectorAll('.chat-contact').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.contact));
        });
        
        document.getElementById('messageInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
