version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: tenderflow_db
      POSTGRES_USER: tenderflow_user
      POSTGRES_PASSWORD: tenderflow_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenderflow_user -d tenderflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_NAME=tenderflow_db
      - DATABASE_USER=tenderflow_user
      - DATABASE_PASSWORD=tenderflow_password
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - SECRET_KEY=supersecretkeyfordev
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_volume: